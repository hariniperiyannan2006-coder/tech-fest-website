<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>
</head>

<body bgcolor="black" style="color:white">

<center>

<h1>Event Registration Form</h1>

<form>
    <table>
        <tr>
            <td>Name:</td>
            <td> <input type="text" placeholder="Enter your name"> </td>
        </tr>
        <tr>
            <td>Register number:</td>
            <td> <input type="number" placeholder="Enter your register number"> </td>
        </tr>
        <tr>
            <td>Department:</td>
            <td>  
            <select>
                <option>ISE</option>
                <option>CSE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>AA</option>
            </select>
            </td>
        </tr>
        <tr>
            <td>Year:</td>
            <td>
                <select>
                     <option>1st year</option>
                     <option>2nd year</option>
                     <option>3rd year</option>
                     <option>4th year</option>

                </select>
            </td>
        </tr>
        <tr>
            <td>Email id:</td>
            <td> <input type="email" placeholder="Enter email id"> </td>
        </tr>
        <tr>
            <td>Phone number:</td>
            <td> <input type="tel" placeholder="Enter phone number"> </td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <select>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Others</option>
                </select>
            </td>
        
    </table>
</form>
<form action="success.html">
    <table>
        ...
        <tr>
            <td><input type="submit" value="Register"></td>
            <td><input type="reset" value="Clear"></td>
        </tr>
    </table>
</form>

</center>

</body>
</html>
